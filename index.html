    <!-- 图片雨特效脚本 -->
    <script>
        // 配置参数
        const totalImages = 32;
        const fallSpeedMin = 3;
        const fallSpeedMax = 8;
        const spinSpeedMin = -2;
        const spinSpeedMax = 2;
        const imageBasePath = './';

        // 密集度设置
        const intensitySettings = {
            light: 1200,    // 小雨：间隔1200ms（默认300ms * 4）
            medium: 300,    // 中雨（默认）：间隔300ms
            heavy: 231,     // 大雨：间隔231ms（300 / 1.3）
            storm: 150      // 暴雨：间隔150ms（300 / 2）
        };

        let currentIntensity = 'medium'; // 默认密度
        let spawnInterval = intensitySettings[currentIntensity];
        let rainIntervalId = null;
        let imagesLoaded = 0;
        const imagePool = [];
        let rainEnabled = true; // 控制是否在下雨

        // 预加载所有图片
        function preloadImages() {
            for (let i = 1; i <= totalImages; i++) {
                const img = new Image();
                img.src = `${imageBasePath}${i}.jpg`;
                img.onload = () => {
                    imagesLoaded++;
                    if (imagesLoaded === totalImages) {
                        console.log(`所有 ${totalImages} 张图片预加载完成，开始图片雨。`);
                        startRaining();
                    }
                };
                img.onerror = () => {
                    console.warn(`图片加载失败: ${img.src}`);
                    imagesLoaded++;
                    if (imagesLoaded === totalImages) {
                        startRaining();
                    }
                };
                imagePool.push(img);
            }
        }

        // 开始下雨效果
        function startRaining() {
            if (!rainEnabled) return;
            
            // 清除之前的定时器（如果存在）
            if (rainIntervalId) {
                clearInterval(rainIntervalId);
            }
            
            // 设置新的定时器
            rainIntervalId = setInterval(createFallingImage, spawnInterval);
            
            // 初始创建一些图片
            for (let i = 0; i < 10; i++) {
                setTimeout(() => createFallingImage(), i * 100);
            }
        }

        // 停止下雨效果
        function stopRaining() {
            if (rainIntervalId) {
                clearInterval(rainIntervalId);
                rainIntervalId = null;
            }
        }

        // 改变下雨密度
        function changeRainIntensity(intensity) {
            // 如果密度相同，则不改变
            if (intensity === currentIntensity) return;
            
            // 更新当前密度和间隔时间
            currentIntensity = intensity;
            spawnInterval = intensitySettings[intensity];
            
            // 更新选中的按钮样式
            document.querySelectorAll('.rain-intensity-option').forEach(option => {
                if (option.dataset.intensity === intensity) {
                    option.classList.add('selected');
                } else {
                    option.classList.remove('selected');
                }
            });
            
            // 重新开始下雨效果
            stopRaining();
            startRaining();
            
            console.log(`已切换为${getIntensityName(intensity)}模式，图片生成间隔：${spawnInterval}ms`);
        }

        // 获取密度名称
        function getIntensityName(intensity) {
            switch(intensity) {
                case 'light': return '小雨';
                case 'medium': return '中雨';
                case 'heavy': return '大雨';
                case 'storm': return '暴雨';
                default: return '中雨';
            }
        }

        // 创建单个下落图片元素并设置动画
        function createFallingImage() {
            if (imagePool.length === 0 || !rainEnabled) return;

            const randomIndex = Math.floor(Math.random() * imagePool.length);
            const imgSource = imagePool[randomIndex];

            const imgElement = document.createElement('img');
            imgElement.className = 'falling-image';
            imgElement.src = imgSource.src;
            imgElement.alt = 'Mod Icon';

            const startX = Math.random() * (window.innerWidth - 50);
            imgElement.style.left = `${startX}px`;

            const fallSpeed = fallSpeedMin + Math.random() * (fallSpeedMax - fallSpeedMin);
            const spinSpeed = spinSpeedMin + Math.random() * (spinSpeedMax - spinSpeedMin);
            let currentRotation = Math.random() * 360;
            let currentY = -100;

            document.body.appendChild(imgElement);

            function animate() {
                currentY += fallSpeed;
                currentRotation += spinSpeed;

                imgElement.style.top = `${currentY}px`;
                imgElement.style.transform = `rotate(${currentRotation}deg)`;

                if (currentY > window.innerHeight) {
                    document.body.removeChild(imgElement);
                    return;
                }

                requestAnimationFrame(animate);
            }

            requestAnimationFrame(animate);
        }

        // 设置面板控制
        document.addEventListener('DOMContentLoaded', function() {
            // 预加载图片
            preloadImages();
            
            const settingsButton = document.getElementById('settingsButton');
            const settingsPanel = document.getElementById('settingsPanel');
            const overlay = document.getElementById('overlay');
            const closeButton = document.getElementById('closeButton');
            const intensityOptions = document.querySelectorAll('.rain-intensity-option');
            
            // 打开设置面板
            settingsButton.addEventListener('click', function() {
                settingsPanel.style.display = 'block';
                overlay.style.display = 'block';
            });
            
            // 关闭设置面板
            function closeSettingsPanel() {
                settingsPanel.style.display = 'none';
                overlay.style.display = 'none';
            }
            
            closeButton.addEventListener('click', closeSettingsPanel);
            overlay.addEventListener('click', closeSettingsPanel);
            
            // 点击选项改变密度
            intensityOptions.forEach(option => {
                option.addEventListener('click', function() {
                    const intensity = this.dataset.intensity;
                    changeRainIntensity(intensity);
                });
            });
            
            // 点击遮罩层外关闭面板
            settingsPanel.addEventListener('click', function(e) {
                if (e.target === this) {
                    closeSettingsPanel();
                }
            });
            
            // 初始选中中雨选项
            document.querySelector('.rain-intensity-option[data-intensity="medium"]').classList.add('selected');
        });

        // 处理窗口大小变化
        window.addEventListener('resize', function() {
            // 这里可以添加窗口大小变化时的处理
        });
    </script>
