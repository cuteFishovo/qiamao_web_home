        /* B站图标样式 */

            background-color: #FB7299;

            position: relative;

        }
        .bilibili-icon:before,
        .bilibili-icon:after {
            content: "";
            position: absolute;
            background-color: white;
        }
        .bilibili-icon:before {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            top: 3px;
            left: 3px;
        }
        .bilibili-icon:after {
            width: 6px;

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // 1. 使用您最初提供的全部图片链接
            const imageUrls = [
                "https://i.mcmod.cn/editor/upload/20200424/1587740157_79030_gyLw.webp",
                "https://i.mcmod.cn/editor/upload/20200430/1588240369_79030_FLjg.webp",
                "https://i.mcmod.cn/item/icon/128x128/0/9150.png?v=23",
                "https://www.mcmod.cn/pages/center/0/album/20140411/13972094192920.png",
                "https://i.mcmod.cn/item/icon/128x128/11/118006.png?v=4",
                "https://i.mcmod.cn/item/icon/128x128/4/45548.png?v=2",
                "https://www.mcmod.cn/pages/class/images/cover/20170619/1497866262_12391_RoDf.jpg",
                "https://i.mcmod.cn/editor/upload/20200714/1594739719_79030_gQqJ.webp",
                "https://i.mcmod.cn/class/cover/20211226/1640486226_21294_Qphm.jpg@480x300.jpg",
                "https://i.mcmod.cn/class/cover/20200714/1594737462_79030_jOwZ.jpg@480x300.jpg",
                "https://i.mcmod.cn/item/icon/128x128/11/110711.png?v=1",
                "https://i.mcmod.cn/editor/upload/20210402/1617373596_39045_ydUP.webp",
                "https://i.mcmod.cn/class/cover/20201002/1601606492_75928_iTSw.jpg@480x300.jpg",
                "https://i.mcmod.cn/editor/upload/20240327/1711518959_281342_QtyQ.webp",
                "https://i.mcmod.cn/class/cover/20240917/1726552508_49791_WjfD.jpg@480x300.jpg",
                "https://i.mcmod.cn/class/cover/20210811/1628651435_4336_TlIA.jpg@480x300.jpg",
                "https://i.mcmod.cn/class/cover/20201017/1602936302_79030_uXoy.jpg@480x300.jpg",
                "https://i.mcmod.cn/class/cover/20200520/1589942145_2_tPFD.jpg@480x300.jpg",
                "https://i.mcmod.cn/editor/upload/20240207/1707314148_134482_Ysxg.webp",
                "https://i.mcmod.cn/class/cover/20200715/1594774694_79030_GWUP.jpg@480x300.jpg",
                "https://i.mcmod.cn/class/cover/20200805/1596622593_79030_ggIm.jpg@480x300.jpg",
                "https://i.mcmod.cn/class/cover/20200715/1594746531_79030_EDmK.jpg@480x300.jpg",
                "https://i.mcmod.cn/class/cover/20230506/1683366517_2_dRGg.jpg@480x300.jpg",
                "https://i.mcmod.cn/item/icon/128x128/0/8320.png?v=3"
            ];

            // 2. 创建图片元素并管理
            const maxImages = 8; // 同时显示的最大图片数量
            const visibleTime = 2500; // 可见时间2.5秒
            
            // 创建显示图片的函数（核心修改）
            function createFloatingImage() {
                // 随机选择一个图片URL
                const randomUrl = imageUrls[Math.floor(Math.random() * imageUrls.length)];
                
                // 创建图片元素
                const img = document.createElement('img');
                img.className = 'floating-image';
                img.alt = 'Minecraft图片';
                
                // **强制设置显示尺寸，忽略原图大小**
                // 统一显示为 80px 宽度，高度自适应
                const displayWidth = 80; // 您可以根据视觉效果调整此数值
                img.style.width = `${displayWidth}px`;
                img.style.height = 'auto'; 
                img.style.maxWidth = `${displayWidth}px`; // 双重保障
                
                // 随机设置位置（避开边缘）
                const margin = 80; // 边距也相应缩小
                const x = margin + Math.random() * (window.innerWidth - 2 * margin);
                const y = margin + Math.random() * (window.innerHeight - 2 * margin);
                
                img.style.left = `${x}px`;
                img.style.top = `${y}px`;
                
                // **已移除旋转角度设置，图片不再倾斜**
                // 原代码中的旋转设置已被删除
                
                // 添加到页面
                document.body.appendChild(img);
                
                // **添加图片加载监听，失败则移除**
                img.onload = function() {
                    // 图片加载成功，开始渐入动画
                    setTimeout(() => {
                        img.style.opacity = '0.8'; // 渐入
                        
                        // 2.5秒后开始淡出
                        setTimeout(() => {
                            img.style.opacity = '0'; // 渐出
                            
                            // 淡出后移除图片
                            setTimeout(() => {
                                if (img.parentNode) {
                                    img.parentNode.removeChild(img);
                                }
                            }, 1500); // 等待淡出动画完成
                        }, visibleTime);
                    }, 100);
                };
                
                img.onerror = function() {
                    // **图片加载失败（可能是防盗链或链接失效），静默移除该元素**
                    console.log(`图片加载失败，已跳过: ${randomUrl}`); // 控制台可查看日志
                    if (img.parentNode) {
                        img.parentNode.removeChild(img);
                    }
                };
                
                // **最后设置src，触发加载（或错误）事件**
                img.src = randomUrl;
                
                // 设置下一次显示（无论本次成功与否）
                const nextShowDelay = 3000 + Math.random() * 7000; // 随机3-10秒后再次显示
                setTimeout(createFloatingImage, nextShowDelay);
            }
            
            // 初始创建多个图片
            for (let i = 0; i < maxImages; i++) {
                // 随机延迟开始，避免所有图片同时出现
                const delay = Math.random() * 5000;
                setTimeout(createFloatingImage, delay);
            }
            
            // 窗口大小改变时，移除所有浮动图片并重新开始
            window.addEventListener('resize', function() {
                document.querySelectorAll('.floating-image').forEach(img => {
                    img.parentNode.removeChild(img);
                });
                
                // 重新创建图片
                for (let i = 0; i < maxImages; i++) {
                    const delay = Math.random() * 5000;
                    setTimeout(createFloatingImage, delay);
                }
            });
        });
    </script>
