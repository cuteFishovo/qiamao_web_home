    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // 1. 图片链接库（您提供的全部24个链接）
            const imageUrls = [
                "https://i.mcmod.cn/editor/upload/20200424/1587740157_79030_gyLw.webp",

                "https://i.mcmod.cn/item/icon/128x128/4/45548.png?v=2",
                "https://www.mcmod.cn/pages/class/images/cover/20170619/1497866262_12391_RoDf.jpg",
                "https://i.mcmod.cn/editor/upload/20200714/1594739719_79030_gQqJ.webp",
                "https://i.mcmod.cn/class/cover/20211226/1640486226_21294_Qphm.jpg@480x300.jpg",
                "https://i.mcmod.cn/class/cover/20200714/1594737462_79030_jOwZ.jpg@480x300.jpg",
                "https://i.mcmod.cn/item/icon/128x128/11/110711.png?v=1",
                "https://i.mcmod.cn/editor/upload/20210402/1617373596_39045_ydUP.webp",
                "https://i.mcmod.cn/class/cover/20201002/1601606492_75928_iTSw.jpg@480x300.jpg",
                "https://i.mcmod.cn/editor/upload/20240327/1711518959_281342_QtyQ.webp",
                "https://i.mcmod.cn/class/cover/20240917/1726552508_49791_WjfD.jpg@480x300.jpg",
                "https://i.mcmod.cn/class/cover/20210811/1628651435_4336_TlIA.jpg@480x300.jpg",
                "https://i.mcmod.cn/class/cover/20201017/1602936302_79030_uXoy.jpg@480x300.jpg",
                "https://i.mcmod.cn/class/cover/20200520/1589942145_2_tPFD.jpg@480x300.jpg",
                "https://i.mcmod.cn/editor/upload/20240207/1707314148_134482_Ysxg.webp",
                "https://i.mcmod.cn/class/cover/20200715/1594774694_79030_GWUP.jpg@480x300.jpg",
                "https://i.mcmod.cn/class/cover/20200805/1596622593_79030_ggIm.jpg@480x300.jpg",
                "https://i.mcmod.cn/class/cover/20200715/1594746531_79030_EDmK.jpg@480x300.jpg",
                "https://i.mcmod.cn/class/cover/20230506/1683366517_2_dRGg.jpg@480x300.jpg",
                "https://i.mcmod.cn/item/icon/128x128/0/8320.png?v=3"
            ];

            // 2. 配置参数
            const MAX_CONCURRENT_IMAGES = 5;      // 同时存在的最大图片数
            const VISIBLE_TIME = 1000;            // 可见时间1秒
            const NEXT_IMAGE_DELAY = 1500;        // 显示下一张图片的固定间隔（毫秒）
            const DISPLAY_WIDTH = 120;            // 显示宽度
            
            // 3. 状态管理变量
            let activeImageCount = 0;             // 当前活跃（正在显示或淡出）的图片数量
            let recentUsedIndexes = [];           // 最近使用过的图片索引（用于简单去重）
            const RECENT_MEMORY_SIZE = 4;         // 记忆最近几张图不重复
            
            // 4. 获取一个可用的随机图片索引（改进的去重逻辑）
            function getRandomImageIndex() {
                let availableIndexes = [];
                
                // 找出所有可能有效的索引（简单实现：全部索引）
                for (let i = 0; i < imageUrls.length; i++) {
                    availableIndexes.push(i);
                }
                
                // 如果可用图片很多，尝试避免使用最近显示过的
                if (availableIndexes.length > RECENT_MEMORY_SIZE) {
                    const filtered = availableIndexes.filter(idx => !recentUsedIndexes.includes(idx));
                    if (filtered.length > 0) {
                        availableIndexes = filtered;
                    }
                }
                
                // 随机选择
                const selectedIndex = availableIndexes[Math.floor(Math.random() * availableIndexes.length)];
                
                // 更新最近使用记录
                recentUsedIndexes.push(selectedIndex);
                if (recentUsedIndexes.length > RECENT_MEMORY_SIZE) {
                    recentUsedIndexes.shift(); // 移除最旧的记录
                }
                
                return selectedIndex;
            }
            
            // 5. 显示单张图片的核心函数
            function showSingleImage() {
                // 如果当前活跃图片数已达上限，则跳过本次
                if (activeImageCount >= MAX_CONCURRENT_IMAGES) {
                    scheduleNextImage();
                    return;
                }
                
                const imgIndex = getRandomImageIndex();
                const imgUrl = imageUrls[imgIndex];
                
                const img = document.createElement('img');
                img.className = 'floating-image';
                img.alt = 'Minecraft图片';
                
                // 设置尺寸和位置（不倾斜）
                img.style.width = `${DISPLAY_WIDTH}px`;
                img.style.height = 'auto';
                img.style.maxWidth = `${DISPLAY_WIDTH}px`;
                
                const margin = 100;
                const x = margin + Math.random() * (window.innerWidth - 2 * margin);
                const y = margin + Math.random() * (window.innerHeight - 2 * margin);
                img.style.left = `${x}px`;
                img.style.top = `${y}px`;
                
                document.body.appendChild(img);
                activeImageCount++; // 增加活跃计数
                
                // 图片加载成功与失败的处理
                img.onload = function() {
                    // 成功：淡入 -> 等待1秒 -> 淡出 -> 移除
                    setTimeout(() => { img.style.opacity = '0.8'; }, 100);
                    
                    setTimeout(() => {
                        img.style.opacity = '0';
                        setTimeout(() => {
                            if (img.parentNode) {
                                img.parentNode.removeChild(img);
                            }
                            activeImageCount--; // 减少活跃计数
                        }, 1000);
                    }, VISIBLE_TIME);
                };
                
                img.onerror = function() {
                    // 失败：静默移除，不执行动画
                    console.log(`图片加载失败，已跳过: ${imgUrl}`);
                    if (img.parentNode) {
                        img.parentNode.removeChild(img);
                    }
                    activeImageCount--; // 减少活跃计数
                    
                    // 从最近使用记录中移除这个失败的索引，以便它可能被其他有效链接替代
                    const failIndex = recentUsedIndexes.indexOf(imgIndex);
                    if (failIndex > -1) {
                        recentUsedIndexes.splice(failIndex, 1);
                    }
                };
                
                img.src = imgUrl;
                
                // 无论本次成功与否，都按固定节奏计划下一张
                scheduleNextImage();
            }
            
            // 6. 计划下一张图片的显示（统一调度入口，防止定时器堆积）
            let isScheduled = false;
            function scheduleNextImage() {
                // 防止重复调度
                if (isScheduled) return;
                
                isScheduled = true;
                setTimeout(() => {
                    isScheduled = false;
                    showSingleImage();
                }, NEXT_IMAGE_DELAY); // 固定的间隔，控制显示节奏
